<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>快捷货币换算找零工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .border-gray-300 { border: 1px solid #d1d5db; }
            .y-padding-cell {
                padding: 6px 0 !important;
                margin: 0 !important;
                height: 56px !important;
                vertical-align: middle !important;
                text-align: center !important;
                position: relative; /* 新增：用于高亮边框定位 */
            }
            .rich-input {
                @apply w-full h-full border-none outline-none text-lg text-center;
                padding: 8px 2px;
                min-height: 40px;
                line-height: 1.5;
            }
            .input-cell {
                @apply w-full h-full border-none outline-none text-center;
                transition: font-size 0.1s ease;
                font-size: 18px;
                width: 100%;
                height: 100%;
            }
            .input-cell::-webkit-outer-spin-button,
            .input-cell::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
            .add-btn { @apply cursor-pointer text-blue-600 hover:text-blue-800 transition-colors text-center; }
            .table-btn {
                @apply w-full h-full flex items-center justify-center text-lg bg-white border-none hover:bg-gray-100 transition-colors;
                line-height: 1.2;
            }
            .number-btn {
                @apply w-full h-full flex items-center justify-center text-xl font-bold bg-white border-none hover:bg-gray-100 transition-colors;
            }
            .func-btn.active {
                @apply bg-blue-50 text-purple-700;
                box-shadow: 0 4px 8px rgba(59, 130, 246, 0.2), 0 1px 3px rgba(59, 130, 246, 0.1);
            }
            .keyboard-cell {
                padding: 0 !important;
                margin: 0 !important;
                height: 66px !important;
                vertical-align: middle !important;
            }
            .separator { @apply text-green-600; }
            .currency-active { @apply text-purple-700 font-bold; }
            .clearance-highlight { @apply text-green-600 font-semibold; }
            .overflow-hidden-text {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            /* 新增：高亮样式 - 外边框铺满单元格 */
            .cell-highlight {
                background-color: #f0f9ff !important;
                border: 2px solid #3b82f6 !important;
                z-index: 1;
            }
            /* 商品价格单元格容器 */
            #priceCell {
                position: relative;
            }
        }
        * { touch-action: manipulation; }
        body { margin: 0; padding: 0; background: #f3f4f6; }
        .main-container { padding: 12px 0; max-width: 100%; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    </style>
</head>
<body>
    <div class="main-container bg-white shadow-lg">
        <h1 class="text-2xl font-bold text-center py-3 text-gray-800 border-b">快捷货币换算找零工具</h1>
        <table>
            <tbody>
                <tr>
                    <td class="border-gray-300 font-bold w-[5.5em] y-padding-cell">计价货币</td>
                    <td class="border-gray-300 y-padding-cell" colspan="4">
                        <select id="baseCurrency" class="w-full h-full border-none outline-none text-lg text-center bg-transparent" onchange="updateActiveCurrency()">
                            <option value="USD" selected>美金 (USD)</option>
                            <option value="THB">泰铢 (THB)</option>
                            <option value="KHR">柬币 (KHR)</option>
                            <option value="CNY">华币 (CNY)</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td id="priceLabel" class="border-gray-300 font-bold add-btn y-padding-cell">
                        <div>商品价格</div>
                        <div class="text-sm text-transparent">(共0件)</div>
                    </td>
                    <!-- 新增：给商品价格单元格加id，用于高亮 -->
                    <td id="priceCell" class="border-gray-300 y-padding-cell" colspan="4">
                        <div id="itemPrice" class="rich-input" contenteditable="false" placeholder="输入商品价格（用#分隔多个价格）"></div>
                    </td>
                </tr>
                <tr>
                    <td class="border-gray-300 font-bold y-padding-cell">币种</td>
                    <td id="currency-USD" class="border-gray-300 font-bold y-padding-cell currency-active">美金</td>
                    <td id="currency-THB" class="border-gray-300 font-bold y-padding-cell">泰铢</td>
                    <td id="currency-KHR" class="border-gray-300 font-bold y-padding-cell">柬币</td>
                    <td id="currency-CNY" class="border-gray-300 font-bold y-padding-cell">华币</td>
                </tr>
                <tr>
                    <td class="border-gray-300 font-bold y-padding-cell">汇率</td>
                    <td class="border-gray-300 y-padding-cell" ondblclick="makeEditable(this, 'rate', 'USD')" id="rateUSD">1</td>
                    <td class="border-gray-300 y-padding-cell" ondblclick="makeEditable(this, 'rate', 'THB')" id="rateTHB">30</td>
                    <td class="border-gray-300 y-padding-cell" ondblclick="makeEditable(this, 'rate', 'KHR')" id="rateKHR">4000</td>
                    <td class="border-gray-300 y-padding-cell" ondblclick="makeEditable(this, 'rate', 'CNY')" id="rateCNY">6.95</td>
                </tr>
                <tr>
                    <td id="changeLabel" class="border-gray-300 font-bold text-green-600 y-padding-cell">金额结清</td>
                    <td class="border-gray-300 y-padding-cell text-center overflow-hidden-text" id="changeUSD">0</td>
                    <td class="border-gray-300 y-padding-cell text-center overflow-hidden-text" id="changeTHB">0</td>
                    <td class="border-gray-300 y-padding-cell text-center overflow-hidden-text" id="changeKHR">0</td>
                    <td class="border-gray-300 y-padding-cell text-center overflow-hidden-text" id="changeCNY">0</td>
                </tr>
                <tr>
                    <td class="border-gray-300 font-bold y-padding-cell">实付</td>
                    <!-- 给实付单元格加id，用于高亮 -->
                    <td id="paidUSDCell" class="border-gray-300 y-padding-cell"><input type="text" id="providedUSD" class="input-cell w-full text-center" value="" placeholder="0" readonly></td>
                    <td id="paidTHBCell" class="border-gray-300 y-padding-cell"><input type="text" id="providedTHB" class="input-cell w-full text-center" value="" placeholder="0" readonly></td>
                    <td id="paidKHRCell" class="border-gray-300 y-padding-cell"><input type="text" id="providedKHR" class="input-cell w-full text-center" value="" placeholder="0" readonly></td>
                    <td id="paidCNYCell" class="border-gray-300 y-padding-cell"><input type="text" id="providedCNY" class="input-cell w-full text-center" value="" placeholder="0" readonly></td>
                </tr>
            </tbody>
        </table>

        <table class="w-full mt-2 border-collapse">
            <tbody>
                <tr>
                    <td class="border-gray-300 keyboard-cell"><button id="cutAmount" class="table-btn func-btn">尾数<br>截断</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="1">1</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="2">2</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="3">3</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="deleteNumber" class="table-btn">删除</button></td>
                </tr>
                <tr>
                    <td class="border-gray-300 keyboard-cell"><button id="roundingRule" class="table-btn func-btn">四舍<br>六入</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="4">4</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="5">5</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="6">6</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="clearAll" class="table-btn">清除</button></td>
                </tr>
                <tr>
                    <td class="border-gray-300 keyboard-cell"><button id="decimalPoint" class="table-btn">.</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="7">7</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="8">8</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="9">9</button></td>
                    <td class="border-gray-300 keyboard-cell"><button class="number-btn" data-number="0">0</button></td>
                </tr>
                <tr>
                    <td class="border-gray-300 keyboard-cell"><button id="addHash" class="table-btn separator">#</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="addDiv" class="table-btn">/</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="addMul" class="table-btn">*</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="addSub" class="table-btn">-</button></td>
                    <td class="border-gray-300 keyboard-cell"><button id="addAdd" class="table-btn">+</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let activeInput = null;
        const currencies = ['USD', 'THB', 'KHR', 'CNY'];
        let rawChange = {};
        let activeFunc = null;
        const SEPARATOR = '#';
        const itemPrice = document.getElementById('itemPrice');
        const priceLabel = document.getElementById('priceLabel');
        const baseCurrency = document.getElementById('baseCurrency');
        const cutAmountBtn = document.getElementById('cutAmount');
        const roundingRuleBtn = document.getElementById('roundingRule');
        const providedInputs = {
            USD: document.getElementById('providedUSD'),
            THB: document.getElementById('providedTHB'),
            KHR: document.getElementById('providedKHR'),
            CNY: document.getElementById('providedCNY')
        };
        const changeElements = {
            USD: document.getElementById('changeUSD'),
            THB: document.getElementById('changeTHB'),
            KHR: document.getElementById('changeKHR'),
            CNY: document.getElementById('changeCNY')
        };
        const changeLabel = document.getElementById('changeLabel');
        // 新增：实付单元格DOM
        const paidCells = {
            USD: document.getElementById('paidUSDCell'),
            THB: document.getElementById('paidTHBCell'),
            KHR: document.getElementById('paidKHRCell'),
            CNY: document.getElementById('paidCNYCell')
        };
        // 新增：商品价格单元格
        const priceCell = document.getElementById('priceCell');

        function removeThousandSeparator(inputEl) {
            if (!inputEl.value) return;
            const cleanValue = inputEl.value.replace(/,/g, '').trim();
            if (cleanValue && isNaN(parseFloat(cleanValue))) {
                inputEl.value = '';
            } else {
                inputEl.value = cleanValue;
            }
            inputEl.style.fontSize = '18px';
            activeInput = inputEl;
        }

        function addThousandSeparatorAndAdjustFont(inputEl) {
            if (!inputEl.value) {
                inputEl.value = '';
                inputEl.style.fontSize = '18px';
                calculateAll();
                return;
            }
            const cleanValue = inputEl.value.replace(/,/g, '').trim();
            if (!cleanValue || cleanValue === '0') {
                inputEl.value = '';
                inputEl.style.fontSize = '18px';
                calculateAll();
                return;
            }
            const num = parseFloat(cleanValue);
            if (isNaN(num) || num < 0) {
                inputEl.value = '';
                inputEl.style.fontSize = '18px';
                calculateAll();
                return;
            }
            const parts = cleanValue.split('.');
            const integerPart = parts[0].replace(/\B(?=(\d{4})+(?!\d))/g, ',');
            const decimalPart = parts[1] ? '.' + parts[1].slice(0, 4) : '';
            const formattedValue = integerPart + decimalPart;
            inputEl.value = formattedValue;
            adjustFontSizeToFit(inputEl);
            calculateAll();
        }

        function adjustFontSizeToFit(inputEl) {
            inputEl.style.fontSize = '18px';
            const maxFont = 18;
            const minFont = 12;
            let currentFont = maxFont;
            while (inputEl.scrollWidth > inputEl.clientWidth && currentFont > minFont) {
                currentFont -= 1;
                inputEl.style.fontSize = `${currentFont}px`;
            }
        }

        function getProvidedValue(curr) {
            const inputEl = providedInputs[curr];
            const cleanValue = inputEl.value.replace(/,/g, '').trim();
            return cleanValue && !isNaN(parseFloat(cleanValue)) ? parseFloat(cleanValue) : 0;
        }

        function updateActiveCurrency() {
            const selectedCurrency = baseCurrency.value;
            currencies.forEach(curr => {
                document.getElementById(`currency-${curr}`).classList.remove('currency-active');
            });
            document.getElementById(`currency-${selectedCurrency}`).classList.add('currency-active');
            calculateAll();
        }

        let justBackFromBlur = true;
        let isClickingKeyboard = false;

        // 新增：设置商品价格框光标（模拟光标，不触发输入法）
        function setPriceCursor() {
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(itemPrice);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        const keyboardButtons = document.querySelectorAll('.table-btn, .number-btn');
        keyboardButtons.forEach(btn => {
            btn.addEventListener('mousedown', () => { isClickingKeyboard = true; });
            btn.addEventListener('mouseup', () => {
                setTimeout(() => { isClickingKeyboard = false; }, 10);
            });
        });

        // 商品价格框事件（彻底禁用输入法）
        itemPrice.addEventListener('blur', (e) => {
            if (!isClickingKeyboard) {
                justBackFromBlur = true;
                const originalText = itemPrice.textContent;
                const newText = addBracketsToText(originalText);
                if (newText !== originalText) {
                    itemPrice.textContent = newText;
                }
            }
        });

        // 商品价格单元格点击事件
        priceCell.addEventListener('click', () => {
            // 移除所有高亮
            Object.values(paidCells).forEach(cell => cell.classList.remove('cell-highlight'));
            priceCell.classList.add('cell-highlight');
            activeInput = itemPrice;
            setPriceCursor(); // 模拟光标，不触发输入法
            justBackFromBlur = false;
        });

        itemPrice.addEventListener('click', () => { 
            justBackFromBlur = false; 
            setPriceCursor();
        });

        function addBracketsToText(text) {
            const regex = /(?<=^|[+\-#])(\d+\.?\d*)([*\/])(\d+\.?\d*)(?=[+\-#]|$)/g;
            return text.replace(regex, '($1$2$3)');
        }

        function getPurePrices() {
            const text = itemPrice.textContent.replace(/\(|\)/g, '') || '';
            return text.trim().split(SEPARATOR).map(p => p.trim()).filter(p => p !== '' && !isNaN(eval(p)));
        }

        function parseMultiPrices() {
            const prices = getPurePrices();
            return prices.reduce((sum, p) => {
                try { return sum + eval(p); }
                catch (e) { return sum + 0; }
            }, 0);
        }

        function updatePriceLabel() {
            const prices = getPurePrices();
            if (prices.length > 0) {
                priceLabel.innerHTML = `<div>添加商品</div><div class="text-sm text-blue-500">(共${prices.length}件)</div>`;
                priceLabel.classList.add('add-btn');
            } else {
                priceLabel.innerHTML = `<div>商品价格</div><div class="text-sm text-transparent">(共0件)</div>`;
                priceLabel.classList.remove('add-btn');
            }
        }

        priceLabel.addEventListener('click', () => {
            const prices = getPurePrices();
            if (prices.length === 0) return;
            priceCell.classList.add('cell-highlight');
            Object.values(paidCells).forEach(cell => cell.classList.remove('cell-highlight'));
            activeInput = itemPrice;
            setPriceCursor();
            document.execCommand('insertText', false, SEPARATOR);
            updatePriceLabel();
            calculateAll();
        });

        function fourSixRound(value) {
            const integer = Math.floor(value);
            const frac = value - integer;
            if (frac < 0.5) return integer;
            if (frac > 0.5) return integer + 1;
            return integer % 2 === 0 ? integer : integer + 1;
        }

        function getProcessedValue(n) {
            if (isNaN(n)) return NaN;
            let v = n;
            if (activeFunc === 'cut') v = Math.floor(v);
            else if (activeFunc === 'round') v = fourSixRound(v);
            return v;
        }

        function formatNum(num) {
            let val = num;
            if (activeFunc === 'cut') val = Math.floor(val);
            else if (activeFunc === 'round') val = fourSixRound(val);
            let numStr = val.toString();
            if (numStr.includes('.')) {
                const [intPart, decPart] = numStr.split('.');
                const formattedInt = intPart.replace(/\B(?=(\d{4})+(?!\d))/g, ",");
                numStr = `${formattedInt}.${decPart.slice(0, 4)}`.replace(/\.?0*$/, '');
            } else {
                numStr = numStr.replace(/\B(?=(\d{4})+(?!\d))/g, ",");
            }
            return numStr;
        }

        function calculateAll() {
            const price = parseMultiPrices();
            const baseCurr = baseCurrency.value;
            const rates = {
                USD: parseFloat(document.getElementById('rateUSD').textContent) || 0,
                THB: parseFloat(document.getElementById('rateTHB').textContent) || 0,
                KHR: parseFloat(document.getElementById('rateKHR').textContent) || 0,
                CNY: parseFloat(document.getElementById('rateCNY').textContent) || 0
            };
            const dueBase = price;
            const provided = {};
            let totalProvidedInBase = 0;
            currencies.forEach(curr => {
                provided[curr] = getProvidedValue(curr);
                totalProvidedInBase += provided[curr] / (rates[curr] / rates[baseCurr]);
            });
            const totalDiffInBase = totalProvidedInBase - dueBase;
            let zeroCount = 0;
            let allZero = true;
            currencies.forEach(curr => {
                rawChange[curr] = totalDiffInBase * rates[curr] / rates[baseCurr];
                const x = getProcessedValue(Math.abs(rawChange[curr]));
                if (!isNaN(x) && x === 0) zeroCount++;
                else allZero = false;
            });
            let labelText = '金额结清';
            let labelClass = 'text-green-600';
            if (isNaN(totalDiffInBase)) {
                labelText = '我方应补';
                labelClass = 'text-red-600';
            } else if (allZero) {
                labelText = '金额结清';
                labelClass = 'text-green-600';
            } else if (zeroCount >= 2) {
                labelText = '去尾结清';
                labelClass = 'clearance-highlight';
            } else if (totalDiffInBase < -0.0001) {
                labelText = '我方应补';
                labelClass = 'text-red-600';
            } else if (totalDiffInBase > 0.0001) {
                labelText = '对方应找零';
                labelClass = 'text-purple-700';
            }
            changeLabel.textContent = labelText;
            changeLabel.className = `border-gray-300 font-bold y-padding-cell ${labelClass}`;
            currencies.forEach(curr => {
                const el = changeElements[curr];
                const formattedNum = formatNum(Math.abs(rawChange[curr]));
                el.textContent = formattedNum;
                el.className = `border-gray-300 y-padding-cell text-center ${labelClass}`;
            });
            updatePriceLabel();
        }

        function makeEditable(element, type, currency) {
            const currentValue = element.textContent;
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentValue;
            input.className = 'w-full h-full border-none outline-none text-lg text-center';
            input.step = '0.0001';
            input.min = '0';
            element.dataset.originalContent = currentValue;
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
            input.onblur = () => {
                const numValue = parseFloat(input.value);
                if (!isNaN(numValue) && numValue >= 0) element.textContent = numValue;
                else element.textContent = element.dataset.originalContent;
                delete element.dataset.originalContent;
                calculateAll();
            };
        }

        function resetFuncBtnStatus() {
            activeFunc = null;
            cutAmountBtn.classList.remove('active');
            roundingRuleBtn.classList.remove('active');
        }

        cutAmountBtn.addEventListener('click', () => {
            if (activeFunc === 'cut') resetFuncBtnStatus();
            else {
                activeFunc = 'cut';
                cutAmountBtn.classList.add('active');
                roundingRuleBtn.classList.remove('active');
            }
            calculateAll();
        });

        roundingRuleBtn.addEventListener('click', () => {
            if (activeFunc === 'round') resetFuncBtnStatus();
            else {
                activeFunc = 'round';
                roundingRuleBtn.classList.add('active');
                cutAmountBtn.classList.remove('active');
            }
            calculateAll();
        });

        itemPrice.addEventListener('input', () => {
            updatePriceLabel();
            calculateAll();
        });

        // 实付单元格点击高亮逻辑（外边框铺满单元格）
        Object.keys(providedInputs).forEach(curr => {
            const input = providedInputs[curr];
            const cell = paidCells[curr];
            
            cell.addEventListener('click', () => {
                // 移除所有高亮
                priceCell.classList.remove('cell-highlight');
                Object.values(paidCells).forEach(c => c.classList.remove('cell-highlight'));
                // 高亮当前单元格
                cell.classList.add('cell-highlight');
                activeInput = input;
                removeThousandSeparator(input);
            });

            input.addEventListener('blur', () => {
                addThousandSeparatorAndAdjustFont(input);
            });
        });

        baseCurrency.addEventListener('change', calculateAll);

        document.querySelectorAll('.number-btn[data-number]').forEach(btn => {
            btn.onclick = () => {
                if (!activeInput) return;
                const num = btn.dataset.number;
                if (activeInput !== itemPrice) {
                    removeThousandSeparator(activeInput);
                    activeInput.value += num;
                } else {
                    document.execCommand('insertText', false, num);
                }
                calculateAll();
            };
        });

        document.getElementById('decimalPoint').addEventListener('click', () => {
            if (!activeInput) return;
            if (activeInput !== itemPrice) {
                removeThousandSeparator(activeInput);
                if (!activeInput.value.includes('.')) activeInput.value += '.';
            } else {
                document.execCommand('insertText', false, '.');
            }
            calculateAll();
        });

        document.getElementById('deleteNumber').addEventListener('click', () => {
            if (!activeInput) return;
            if (activeInput !== itemPrice) {
                removeThousandSeparator(activeInput);
                activeInput.value = activeInput.value.slice(0, -1);
            } else {
                document.execCommand('delete', false);
            }
            calculateAll();
        });

        document.getElementById('clearAll').addEventListener('click', () => {
            itemPrice.textContent = '';
            Object.values(providedInputs).forEach(i => {
                i.value = '';
                i.style.fontSize = '18px';
            });
            // 清除所有高亮
            priceCell.classList.remove('cell-highlight');
            Object.values(paidCells).forEach(cell => cell.classList.remove('cell-highlight'));
            document.getElementById('rateUSD').textContent = '1';
            document.getElementById('rateTHB').textContent = '30';
            document.getElementById('rateKHR').textContent = '4000';
            document.getElementById('rateCNY').textContent = '6.95';
            resetFuncBtnStatus();
            calculateAll();
        });

        function insertChar(ch) {
            if (!activeInput || activeInput !== itemPrice) return;
            document.execCommand('insertText', false, ch);
            calculateAll();
        }

        document.getElementById('addHash').onclick = () => insertChar(SEPARATOR);
        document.getElementById('addDiv').onclick = () => insertChar('/');
        document.getElementById('addMul').onclick = () => insertChar('*');
        document.getElementById('addSub').onclick = () => insertChar('-');
        document.getElementById('addAdd').onclick = () => insertChar('+');

        updateActiveCurrency();
        calculateAll();
    </script>
</body>
</html>
